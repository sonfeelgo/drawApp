<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI お絵描き判定</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 56px; /* HeaderSpace */
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: 24px;
    }

    /* ── ページヘッダー（PageTitleArea: 68px） ── */
    .page-header {
      min-height: 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px; /* ContainerSpace */
    }
    h1 {
      font-size: 20pt; /* PageTitleText */
      font-weight: 800;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 12px; /* StandardText */
      color: #94a3b8;
    }

    /* ── モード切替タブ ── */
    .mode-tabs {
      display: flex;
      gap: 4px;
      background: #1e293b;
      border-radius: 6px; /* Standard shape */
      padding: 4px;
      margin-bottom: 25px; /* ContainerSpace */
    }
    .mode-tab {
      padding: 0 24px;
      height: 38px; /* S size */
      border-radius: 4px;
      border: none;
      font-size: 14px; /* ButtonLabelText */
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: #64748b;
      transition: all 0.15s;
    }
    .mode-tab.active {
      background: #6366f1;
      color: #fff;
    }

    /* ── メインレイアウト ── */
    .main {
      display: flex;
      gap: 25px; /* ContainerSpace */
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 720px;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px; /* ElemmentSpaceY */
    }

    /* ── キャンバス ── */
    #canvas {
      background: #fff;
      border-radius: 6px; /* Standard shape */
      cursor: crosshair;
      touch-action: none;
      box-shadow: 0 0 0 3px #334155;
      display: block;
    }

    /* ── カメラ ── */
    .camera-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 6px; /* Standard shape */
      overflow: hidden;
      box-shadow: 0 0 0 3px #334155;
      background: #000;
      display: none;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .camera-overlay {
      position: absolute;
      inset: 0;
      border: 3px dashed rgba(52,232,125,0.5); /* Success color accent */
      border-radius: 6px;
      pointer-events: none;
    }

    .hint {
      font-size: 12px; /* StandardText */
      color: #64748b;
    }

    /* ── ボタン共通 ── */
    .btn-row {
      display: flex;
      gap: 16px; /* ElemmentSpaceX */
    }
    .btn {
      padding: 0 22px;
      border-radius: 6px; /* Standard shape */
      border: none;
      font-size: 14px; /* ButtonLabelText */
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      min-width: 80px;
    }
    .btn:hover { opacity: 0.85; }

    /* Secondary: 消す / カメラ開始（S size: 38px） */
    .btn-clear  { height: 38px; background: #334155; color: #f1f5f9; }
    .btn-camera { height: 38px; background: #B752E2; color: #fff; } /* Info */

    /* Primary: 判定する（M size: 60px） */
    .btn-predict {
      height: 60px;
      background: #34E87D; /* Success */
      color: #0f172a;
    }
    .btn-predict:disabled {
      background: #334155;
      color: #64748b;
      cursor: default;
      opacity: 0.5; /* Disabled */
    }

    /* レスポンシブ: 600px以下はフルwidth */
    @media (max-width: 600px) {
      .btn-row { flex-direction: column; width: 280px; }
      .btn { width: 100%; }
    }

    /* ── 結果エリア ── */
    .result-area {
      flex: 1;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px; /* ElemmentSpaceY */
    }
    .result-title {
      font-size: 12px; /* StandardText */
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .winner-box {
      background: #1e293b;
      border-radius: 6px; /* Standard shape */
      padding: 16px; /* PanelPadding */
      text-align: center;
      border: 1px solid #334155;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .winner-emoji { font-size: 48px; line-height: 1; }
    .winner-name  { font-size: 20px; font-weight: 800; margin-top: 8px; } /* PanelTextSpace */
    .winner-conf  { font-size: 12px; color: #94a3b8; margin-top: 8px; } /* PanelTextSpace / StandardText */
    .placeholder  { font-size: 12px; color: #475569; } /* StandardText */

    .bar-list { display: flex; flex-direction: column; gap: 8px; } /* PanelTextSpace */
    .bar-item { display: flex; flex-direction: column; gap: 3px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 12px; } /* StandardText */
    .bar-name  { display: flex; align-items: center; gap: 6px; }
    .bar-pct   { color: #94a3b8; font-size: 12px; } /* StandardText */
    .bar-track { height: 8px; background: #1e293b; border-radius: 99px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; background: #475569; transition: width 0.4s ease; }
    .bar-fill.top { background: linear-gradient(90deg, #34E87D, #B752E2); } /* Success → Info */

    .status {
      font-size: 12px; /* StandardText */
      color: #64748b;
      text-align: center;
      padding: 6px 0;
    }
    .status.loading { color: #60a5fa; }
    .status.error   { color: #f87171; }
  </style>
</head>
<body>

<!-- ページヘッダー（PageTitleArea: 68px） -->
<div class="page-header">
  <h1>🎨 AI 動物判定</h1>
  <p class="subtitle">キリン・うさぎ・ぞう・ライオン・ワニを認識します</p>
</div>

<!-- モード切替 -->
<div class="mode-tabs">
  <button class="mode-tab active" onclick="switchMode('draw')">✏️ お絵描き</button>
  <button class="mode-tab"        onclick="switchMode('camera')">📷 カメラ</button>
</div>

<div class="main">
  <!-- 左：入力エリア -->
  <div class="input-area">

    <!-- お絵描きモード -->
    <canvas id="canvas" width="280" height="280"></canvas>
    <p class="hint" id="hint">マウス or タッチで描いてください</p>
    <div class="btn-row" id="drawBtns">
      <button class="btn btn-clear" onclick="clearCanvas()">消す</button>
      <button class="btn btn-predict" id="predictBtn" onclick="predict()" disabled>判定する</button>
    </div>

    <!-- カメラモード -->
    <div class="camera-wrap" id="cameraWrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="camera-overlay"></div>
    </div>
    <div class="btn-row" id="cameraBtns" style="display:none">
      <button class="btn btn-camera" id="startCamBtn" onclick="startCamera()">カメラ開始</button>
      <button class="btn btn-predict" id="captureBtn" onclick="predictCamera()" disabled>判定する</button>
    </div>

    <p class="status" id="status">モデルを読み込み中...</p>
  </div>

  <!-- 右：結果 -->
  <div class="result-area">
    <p class="result-title">判定結果</p>
    <div class="winner-box" id="winnerBox">
      <p class="placeholder">判定するを押してください</p>
    </div>
    <div class="bar-list" id="barList"></div>
  </div>
</div>

<script>
const CATEGORIES = [
  { name: 'キリン',    emoji: '🦒', en: 'giraffe'   },
  { name: 'うさぎ',   emoji: '🐰', en: 'rabbit'    },
  { name: 'ぞう',     emoji: '🐘', en: 'elephant'  },
  { name: 'ライオン', emoji: '🦁', en: 'lion'      },
  { name: 'ワニ',     emoji: '🐊', en: 'crocodile' },
];

let currentMode = 'draw';

// ── モード切替 ───────────────────────────────────────────
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && mode === 'draw') || (i === 1 && mode === 'camera'));
  });

  const isDraw = mode === 'draw';
  document.getElementById('canvas').style.display      = isDraw ? 'block' : 'none';
  document.getElementById('drawBtns').style.display    = isDraw ? 'flex'  : 'none';
  document.getElementById('cameraWrap').style.display  = isDraw ? 'none'  : 'block';
  document.getElementById('cameraBtns').style.display  = isDraw ? 'none'  : 'flex';
  document.getElementById('hint').textContent          = isDraw
    ? 'マウス or タッチで描いてください'
    : '動物の絵をカメラに向けてください';

  if (!isDraw) {
    resetResult();
  } else {
    stopCamera();
  }
}

// ── キャンバス ───────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let drawing = false;
let hasDrawing = false;
let lastX = 0, lastY = 0;

function initCtx() {
  ctx.lineWidth = 14;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#111';
}
initCtx();

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (canvas.width / r.width),
    y: (e.clientY - r.top)  * (canvas.height / r.height),
  };
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  drawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
  ctx.beginPath();
  ctx.arc(p.x, p.y, ctx.lineWidth / 2, 0, Math.PI * 2);
  ctx.fillStyle = ctx.strokeStyle;
  ctx.fill();
  hasDrawing = true;
});
canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  e.preventDefault();
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  lastX = p.x; lastY = p.y;
  hasDrawing = true;
});
canvas.addEventListener('pointerup',     () => { drawing = false; });
canvas.addEventListener('pointercancel', () => { drawing = false; });

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  initCtx();
  hasDrawing = false;
  resetResult();
}

// ── カメラ ───────────────────────────────────────────────
const video = document.getElementById('video');
let stream = null;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    video.srcObject = stream;
    document.getElementById('startCamBtn').textContent = '📷 起動中';
    document.getElementById('startCamBtn').disabled = true;
    document.getElementById('captureBtn').disabled = !model;
    setStatus(model ? '準備完了！判定するを押してください' : 'モデル読み込み待機中...', '');
  } catch (e) {
    setStatus('カメラへのアクセスが拒否されました', 'error');
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    video.srcObject = null;
    document.getElementById('startCamBtn').textContent = 'カメラ開始';
    document.getElementById('startCamBtn').disabled = false;
    document.getElementById('captureBtn').disabled = true;
  }
}

// ── 前処理（共通）───────────────────────────────────────
function preprocessSource(source) {
  const off = document.createElement('canvas');
  off.width = 28; off.height = 28;
  const oc = off.getContext('2d');
  oc.drawImage(source, 0, 0, 28, 28);
  const pixels = oc.getImageData(0, 0, 28, 28).data;
  const gray = new Float32Array(28 * 28);
  for (let i = 0; i < 28 * 28; i++) {
    const lum = pixels[i*4] * 0.299 + pixels[i*4+1] * 0.587 + pixels[i*4+2] * 0.114;
    gray[i] = (255 - lum) / 255.0;
  }
  return tf.tensor4d(gray, [1, 28, 28, 1]);
}

// ── モデル ───────────────────────────────────────────────
let model = null;

async function loadModel() {
  setStatus('モデルを読み込み中...', 'loading');
  try {
    model = await tf.loadLayersModel('./model/model.json');
    setStatus('準備完了！', '');
    document.getElementById('predictBtn').disabled = false;
  } catch (e) {
    setStatus('モデルの読み込みに失敗しました', 'error');
    console.error(e);
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

// ── 判定（共通） ─────────────────────────────────────────
async function runPredict(source) {
  if (!model) return;
  setStatus('判定中...', 'loading');
  const input = preprocessSource(source);
  const output = model.predict(input);
  const probs = await output.data();
  input.dispose(); output.dispose();

  const results = CATEGORIES.map((cat, i) => ({ ...cat, prob: probs[i] }))
    .sort((a, b) => b.prob - a.prob);
  const top = results[0];

  document.getElementById('winnerBox').innerHTML = `
    <div class="winner-emoji">${top.emoji}</div>
    <div class="winner-name">${top.name}</div>
    <div class="winner-conf">${(top.prob * 100).toFixed(1)}% の確信度</div>
  `;
  document.getElementById('barList').innerHTML = results.map((r, i) => `
    <div class="bar-item">
      <div class="bar-label">
        <span class="bar-name">${r.emoji} ${r.name}</span>
        <span class="bar-pct">${(r.prob * 100).toFixed(1)}%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill ${i === 0 ? 'top' : ''}" style="width:${(r.prob * 100).toFixed(1)}%"></div>
      </div>
    </div>
  `).join('');
  setStatus('');
}

function predict()       { if (hasDrawing) runPredict(canvas); }
function predictCamera() { if (stream)     runPredict(video);  }

function resetResult() {
  document.getElementById('winnerBox').innerHTML = '<p class="placeholder">判定するを押してください</p>';
  document.getElementById('barList').innerHTML = '';
}

// 初期化
clearCanvas();
loadModel();
</script>
</body>
</html>
